name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = if ($tag -match '^v(?<v>\d+\.\d+\.\d+.*)$') { $Matches.v } else { "0.0.${{ github.run_number }}" }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Stamp version
        shell: pwsh
        run: |
          $pkgPath = "package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = "${{ steps.version.outputs.value }}"
          $pkg | ConvertTo-Json -Depth 20 | Set-Content $pkgPath

          $tauriPath = "src-tauri/tauri.conf.json"
          $tauri = Get-Content $tauriPath -Raw | ConvertFrom-Json
          $tauri.version = "${{ steps.version.outputs.value }}"
          $tauri | ConvertTo-Json -Depth 20 | Set-Content $tauriPath

      - name: Install dependencies
        run: npm ci

      - name: Build signed app and updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Create updater manifest
        shell: pwsh
        run: |
          .\scripts\CreateLatestJson.ps1 `
            -Version "${{ steps.version.outputs.value }}" `
            -Repository "${{ github.repository }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: QuickClipper ${{ steps.version.outputs.value }}
          tag_name: v${{ steps.version.outputs.value }}
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/latest.json
