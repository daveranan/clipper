name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = if ($tag -match '^v(?<v>\d+\.\d+\.\d+.*)$') { $Matches.v } else { "0.0.${{ github.run_number }}" }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Stamp version
        shell: pwsh
        run: |
          $pkgPath = "package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = "${{ steps.version.outputs.value }}"
          $pkg | ConvertTo-Json -Depth 20 | Set-Content $pkgPath

          $tauriPath = "src-tauri/tauri.conf.json"
          $tauri = Get-Content $tauriPath -Raw | ConvertFrom-Json
          $tauri.version = "${{ steps.version.outputs.value }}"
          $tauri | ConvertTo-Json -Depth 20 | Set-Content $tauriPath

      - name: Install dependencies
        run: npm ci

      - name: Build signed app and updater artifacts
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"

          $privateKey = $env:TAURI_SIGNING_PRIVATE_KEY_RAW
          if ([string]::IsNullOrWhiteSpace($privateKey)) {
            throw "Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY."
          }

          $privateKey = $privateKey -replace '\\r\\n', "`n" -replace '\\n', "`n"
          $privateKey = $privateKey.Trim().Trim('"').Trim("'").Trim()

          if ($privateKey.Contains("`n")) {
            $candidate = $privateKey -split '\r?\n' |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -match '^[A-Za-z0-9+/=]{80,}$' } |
              Select-Object -First 1

            if ($candidate) {
              $privateKey = $candidate
            }
          }

          if ($privateKey -notmatch '^[A-Za-z0-9+/=]+$') {
            throw "TAURI_SIGNING_PRIVATE_KEY must be the base64 private key body from src-tauri/tauri-updater.key, not the public key, a file path, or a comment-prefixed minisign block."
          }

          $env:TAURI_SIGNING_PRIVATE_KEY = $privateKey
          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = if ($null -eq $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD_RAW) { "" } else { $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD_RAW.Trim() }

          $signTest = Join-Path $env:RUNNER_TEMP "tauri-signing-test.txt"
          Set-Content -Path $signTest -Value "test" -NoNewline
          npx tauri signer sign $signTest | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Tauri signing key validation failed. Recreate TAURI_SIGNING_PRIVATE_KEY from src-tauri/tauri-updater.key and TAURI_SIGNING_PRIVATE_KEY_PASSWORD from src-tauri/tauri-updater.password."
          }

          npm run tauri build

      - name: Create updater manifest
        shell: pwsh
        run: |
          .\scripts\CreateLatestJson.ps1 `
            -Version "${{ steps.version.outputs.value }}" `
            -Repository "${{ github.repository }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: QuickClipper ${{ steps.version.outputs.value }}
          tag_name: v${{ steps.version.outputs.value }}
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/latest.json
